<div class="agenda-section">
    <div class="agenda-header">
        <h2 class="agenda-title">{{ selected_date }}</h2>
        <button class="empty-button-primary" onclick="openModal()">＋ Adicionar Tópico</button>
    </div>

    <form method="get" action="{% url 'materia' %}" id="dateForm" style="display:none">
        <input
                type="date"
                name="date"
                value="{{ selected_date|date:'Y-m-d' }}"
                id="dateInput"
        >
    </form>

    {% if topics %}
        <div class="agenda-topics">
            {% for topic in topics %}
                <div class="agenda-topic-item {% if topic.is_completed %}agenda-topic-done{% endif %}"
                     style="background-color: color-mix({{ topic.materia.cor }} 15%, transparent); filter: saturate(120%);">
                    <div class="agenda-topic-main">
                        <form method="post" action="{% url 'topic_toggle_completed' topic.pk %}"
                              style="margin:0">
                            {% csrf_token %}
                            <input type="hidden" name="next"
                                   value="{% url 'materia' %}?date={{ selected_date|date:'Y-m-d' }}">
                            <button class="topic-check {% if topic.is_completed %}topic-checked{% endif %}"
                                    type="submit"
                                    title="Marcar como concluído / desfazer">
                            </button>
                        </form>
                        <span class="agenda-topic-materia"
                              style="color: {{ topic.materia.cor }}; filter: brightness(80%) saturate(150%);">
                                        {{ topic.materia.nome }}
                                    </span>
                        <div class="agenda-topic-text">
                            <div class="agenda-topic-title {% if topic.is_completed %}topic-done{% endif %}">
                                {{ topic.nome }}
                                {% if topic.link %}
                                    <a class="topic-link" href="{{ topic.link }}" target="_blank"
                                       rel="noopener noreferrer">abrir</a>
                                {% endif %}
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="muted agenda-empty">Nenhum tópico agendado para este dia.</p>
    {% endif %}
</div>
