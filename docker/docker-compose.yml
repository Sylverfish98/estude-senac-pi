name: "estude"
services:
  estude-web-application:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: estude-app
    volumes:
      - estude-db:/app/src/database
      - staticfiles:/app/src/staticfiles
    networks:
      - estude-network

  nginx:
    image: nginx:alpine
    container_name: estude-nginx
    ports:
      - "8000:80"
    volumes:
      - staticfiles:/app/staticfiles:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - estude-web-application
    networks:
      - estude-network

volumes:
  estude-db:
    name: "estude-db"
  staticfiles:
    name: "estude-staticfiles"

networks:
  estude-network:
    name: "estude-network"